name: Deploy - Terraform Apply

# Provisions infrastructure (Terraform) and publishes the built Angular app, all in CI.
# Auth is OIDC (role-to-assume), matching the inbox-aggregator setup - no static keys.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  # Path produced by @angular/build:application (outputPath/browser).
  BUILD_DIR: dist/freight-load-board/browser

jobs:
  deploy:
    name: Terraform Apply and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Terraform's S3 backend can't create its own state bucket (chicken/egg),
      # so create it here. Idempotent: skips if it already exists.
      - name: Bootstrap S3 state bucket
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          REGION="${{ vars.AWS_REGION }}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "State bucket '$BUCKET' already exists - skipping creation."
          else
            echo "Creating state bucket '$BUCKET'..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created and configured."
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false # so `terraform output -raw` is clean

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw s3_bucket)" >> "$GITHUB_OUTPUT"
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "site_url=$(terraform output -raw site_url)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync to S3
        run: |
          # Hashed assets are immutable: cache a year. index.html: never cache.
          aws s3 sync "$BUILD_DIR" "s3://${{ steps.tf.outputs.bucket }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp "$BUILD_DIR/index.html" \
            "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        if: steps.tf.outputs.cf_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cf_id }} \
            --paths "/*"

      - name: Summary
        run: echo "### Deployed - ${{ steps.tf.outputs.site_url }}" >> "$GITHUB_STEP_SUMMARY"
